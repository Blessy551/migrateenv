version: "3.9"

# -----------------------------------------------------------------------
# MigrateEnv — Supabase edition
#
# The local postgres service has been REMOVED. Set DATABASE_URL in your
# .env file to your Supabase Session Mode pooler connection string:
#
#   postgresql://postgres.[ref]:[password]@aws-0-[region].pooler.supabase.com:5432/postgres
#
# Supabase free tier notes:
#   • Use the SESSION pooler (port 5432), not Transaction (port 6543)
#   • SSL is enforced automatically via the connection string
#   • No DROP DATABASE / CREATE DATABASE is needed (loader handles this)
# -----------------------------------------------------------------------

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: migrateenv_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "7860:7860"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:7860/health').raise_for_status()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
