name: MigrateEnv
version: "1.0.0"
description: >
  A session-based environment for evaluating agents on real-world SQL schema
  migration tasks with deterministic graders and incremental rewards.
author: "Blessy-karen"
tags:
  - openenv
  - database
  - migration
  - sql
  - real-world

interface:
  reset:
    method: POST
    path: /reset
    body:
      task_id: string
    returns:
      session_id: string
      observation: object

  step:
    method: POST
    path: /step
    body:
      session_id: string
      action_type: string
      sql: string?
      inspect_query: string?
    returns:
      observation: object
      reward: float
      done: boolean
      info: object
      reward_model: object

  state:
    method: GET
    path: /state
    returns: env_state

endpoints:
  - GET /health
  - GET /openenv.yaml
  - GET /tasks
  - GET /grader

tasks:
  - id: easy
    difficulty: easy
    description: Add and backfill is_verified on users
    max_steps: 10
    target_reward: 0.95

  - id: medium
    difficulty: medium
    description: Split a mixed orders table into orders plus shipments
    max_steps: 20
    target_reward: 0.95

  - id: hard
    difficulty: hard
    description: Apply a multi-table version upgrade across users, products, and orders
    max_steps: 30
    target_reward: 0.80

database:
  engine: postgresql
  dataset: task-seeded
  version: "PostgreSQL 15"
  reset_strategy: task_seed_reset

grader:
  model: task_specific
  penalties:
    invalid_sql: -0.05
    redundant_step: -0.02
  score_range: [0.0, 1.0]

baseline:
  script: inference.py
  model: Qwen/Qwen2.5-72B-Instruct
  env_vars:
    HF_TOKEN: "Your HuggingFace / API key"
    API_BASE_URL: "LLM endpoint (default: https://router.huggingface.co/v1)"
    MODEL_NAME: "Model identifier (default: Qwen/Qwen2.5-72B-Instruct)"
    DATABASE_URL: "PostgreSQL connection string"
